<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-body">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(90deg, #ed7857 0%, #f4a28a 100%);
        }

        body {
            background: linear-gradient(-45deg, #ed7857, #f4a28a, #ffe5dc, #ffffff);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-left {
            background: #f5f7fa;
        }

        .login-right h2 {
            font-size: 28px;
            margin-bottom: 10px;
            margin-left: 180px;
            position: relative;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        .login-right h2::after {
            content: "";
            width: 50px;
            height: 3px;
            background: #ED7857;
            display: block;
            margin-top: 5px;
            margin-left: 80px;
        }

        /* MAIN CONTAINER */
        .login-container {
            width: 80%;
            height: 80vh;
            margin: auto;
            margin-top: 50px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* LEFT SIDE */
        .login-left {
            width: 50%;
            /* background: #ED7857; */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .login-left img {
            width: 70%;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(237, 120, 87, 0.6));
        }

        .login-left img:hover {
            transform: scale(1.08);
            transition: 0.3s;
        }

        /* RIGHT SIDE */
        .login-right {
            width: 50%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .login-right input {
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .login-right button {
            background: #ED7857;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .login-right button:hover {
            background: #d65f42;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(237, 120, 87, 0.4);
        }

        .login-left {
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
            }
        }

        .login-left img {
            width: 70%;
            animation: floatStrong 3s ease-in-out infinite;
        }

        @keyframes floatStrong {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(1deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        @keyframes zoomImage {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.05);
            }
        }

        .loader {
            display: none;
            margin: 15px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ED7857;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .success {
            display: none;
            color: green;
            font-size: 30px;
            text-align: center;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        .error-shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>


    <div class="login-container">

        <!-- LEFT SIDE -->
        <div class="login-left">
            <img src="image/Best_Gaming_PCs-removebg-preview.png">
        </div>

        <!-- RIGHT SIDE -->
        <div class="login-right">

            <h2>Admin Login</h2><br><br>

            <input type="text" placeholder="Username" id="username"><br>
            <input type="password" placeholder="Password" id="password"><br><br>

            <button onclick="login()">Login</button>

            <p id="error"></p>

            <div id="loader" class="loader"></div>

            <div id="success" class="success"><i class="fa-regular fa-badge-check"></i></div>

        </div>

    </div>

    <script>
        function login() {

            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            let loader = document.getElementById("loader");
            let success = document.getElementById("success");
            let container = document.querySelector(".login-container");

            loader.style.display = "block";

            setTimeout(() => {

                loader.style.display = "none";

                if (user === "admin" && pass === "1234") {

                    success.style.display = "block";

                    localStorage.setItem("admin", "true");

                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);

                } else {

                    document.getElementById("error").innerText = "Invalid credentials!";
                    container.classList.add("error-shake");

                    setTimeout(() => {
                        container.classList.remove("error-shake");
                    }, 300);

                }

            }, 1500);

        }
    </script>

</body>

</html>
